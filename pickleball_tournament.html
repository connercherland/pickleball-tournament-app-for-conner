<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pickleball RR">
<title>Pickleball Tournament Manager</title>
<style>
:root {
  --green:#2D6A4F;--green-light:#B7E4C7;--green-pale:#D8F3DC;--green-dark:#1B4332;
  --gold:#D4A017;--gold-light:#FFF3CD;--amber:#E07B00;
  --red:#C0392B;--red-light:#FADBD8;
  --blue:#2471A3;--blue-light:#D6EAF8;
  --g100:#F8F9F8;--g200:#EDEFED;--g300:#D5D9D5;--g500:#8A9A8A;--g700:#4A5A4A;--g900:#1A251A;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
  --mono:'SF Mono','SFMono-Regular','Consolas','Liberation Mono',Menlo,monospace;
  --r:10px;--rl:16px;--sh:0 2px 12px rgba(0,0,0,.08);--shl:0 8px 32px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--g100);color:var(--g900);min-height:100vh;font-size:15px;line-height:1.5;}

header{background:var(--green-dark);color:#fff;padding:0 20px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:9px;font-size:16px;font-weight:600;}
.logo-icon{width:28px;height:28px;background:var(--green);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;}
#round-badge{font-family:var(--mono);font-size:12px;background:rgba(255,255,255,.15);padding:3px 11px;border-radius:20px;color:rgba(255,255,255,.9);display:none;}

main{max-width:700px;margin:0 auto;padding:20px 14px 48px;}
.card{background:#fff;border-radius:var(--rl);box-shadow:var(--sh);padding:18px;margin-bottom:14px;}
.card-title{font-size:15px;font-weight:600;color:var(--g900);margin-bottom:12px;}
.divider{height:1px;background:var(--g200);margin:14px 0;}

.steps{display:flex;gap:7px;margin-bottom:18px;flex-wrap:wrap;}
.step{font-size:11px;font-weight:500;padding:4px 13px;border-radius:20px;border:1.5px solid var(--g300);color:var(--g500);font-family:var(--mono);}
.step.active{background:var(--green-dark);color:#fff;border-color:var(--green-dark);}
.step.done{background:var(--green-pale);color:var(--green-dark);border-color:var(--green-light);}

.field-label{display:block;font-size:11px;font-weight:500;color:var(--g500);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}

.courts-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.ctr-btn{width:44px;height:44px;border-radius:50%;border:1.5px solid var(--g300);background:#fff;color:var(--g700);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--mono);line-height:1;flex-shrink:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.courts-val{font-size:26px;font-weight:600;font-family:var(--mono);color:var(--green-dark);min-width:30px;text-align:center;}
.courts-hint{font-size:12px;color:var(--g500);}

/* player add row */
.add-form{display:flex;gap:7px;align-items:stretch;margin-bottom:9px;}
.add-form input{flex:1;min-width:0;font-family:var(--font);font-size:16px;color:var(--g900);background:var(--g100);border:1.5px solid var(--g200);border-radius:var(--r);padding:10px 12px;outline:none;-webkit-appearance:none;}
.add-form input:focus{border-color:var(--green);background:#fff;}
.add-form button{font-family:var(--font);font-size:15px;font-weight:600;padding:10px 20px;border-radius:var(--r);border:none;background:var(--green-dark);color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;white-space:nowrap;}
.add-form button:active{opacity:.8;}

.player-count{font-size:11px;color:var(--g500);font-family:var(--mono);margin-bottom:7px;}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;min-height:28px;}
.chip{display:flex;align-items:center;gap:5px;background:var(--green-pale);color:var(--green-dark);border:1px solid var(--green-light);border-radius:20px;padding:3px 9px;font-size:12px;font-weight:500;}
.chip-x{cursor:pointer;color:var(--green);font-size:16px;line-height:1;padding:2px 4px;-webkit-tap-highlight-color:transparent;}

.btn{font-family:var(--font);font-size:14px;font-weight:500;padding:10px 16px;border-radius:var(--r);border:1.5px solid transparent;cursor:pointer;white-space:nowrap;line-height:1.3;-webkit-tap-highlight-color:transparent;touch-action:manipulation;min-height:44px;display:inline-flex;align-items:center;justify-content:center;}
.btn:active{opacity:.8;}
.btn-primary{background:var(--green-dark);color:#fff;}
.btn-secondary{background:#fff;color:var(--g700);border-color:var(--g300);}
.btn-danger{background:#fff;color:var(--red);border-color:#F1948A;}
.btn-success{background:#fff;color:var(--green-dark);border-color:var(--green-light);}

.alert{border-radius:var(--r);padding:9px 13px;font-size:13px;font-weight:500;margin-bottom:10px;display:none;}
.alert-green{background:var(--green-pale);color:var(--green-dark);border:1px solid var(--green-light);}
.alert-amber{background:var(--gold-light);color:var(--amber);border:1px solid #F9E79F;}
.alert-red{background:var(--red-light);color:var(--red);border:1px solid #F1948A;}

.play-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.btn-row{display:flex;gap:6px;flex-wrap:wrap;}
.sitout-bar{background:var(--gold-light);border:1px solid #F9E79F;border-radius:var(--r);padding:7px 13px;font-size:13px;color:var(--amber);font-weight:500;margin-bottom:10px;display:none;}

.court-card{background:var(--g100);border:1.5px solid var(--g200);border-radius:var(--r);padding:13px 15px;margin-bottom:9px;}
.court-lbl{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--g500);text-transform:uppercase;letter-spacing:1px;margin-bottom:9px;}
.matchup{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:9px;}
.team{display:flex;align-items:center;gap:5px;flex:1;flex-wrap:wrap;}
.team-r{justify-content:flex-end;}
.ptag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:500;}
.tag-b{background:var(--blue-light);color:var(--blue);}
.tag-g{background:var(--green-pale);color:var(--green-dark);}
.vs-badge{font-family:var(--mono);font-size:10px;color:var(--g500);background:#fff;border:1px solid var(--g300);border-radius:5px;padding:2px 7px;flex-shrink:0;}
.score-row{display:flex;align-items:flex-start;justify-content:center;gap:10px;}
.score-col{display:flex;flex-direction:column;align-items:center;gap:3px;}
.score-inp{font-family:var(--mono);font-size:22px;font-weight:600;text-align:center;width:68px;padding:7px 4px;background:#fff;border:1.5px solid var(--g200);border-radius:var(--r);outline:none;color:var(--g900);-webkit-appearance:none;}
.score-inp:focus{border-color:var(--green);}
.score-lbl{font-size:10px;color:var(--g500);font-family:var(--mono);text-align:center;}
.score-dash{font-size:22px;color:var(--g300);margin-top:8px;}

.standings-link{background:none;border:none;font-size:13px;color:var(--green-dark);cursor:pointer;font-family:var(--font);font-weight:500;text-decoration:underline;text-underline-offset:3px;padding:8px 4px;min-height:44px;display:inline-flex;align-items:center;-webkit-tap-highlight-color:transparent;}
#standings-panel{display:none;margin-top:12px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-size:10px;font-weight:500;color:var(--g500);text-transform:uppercase;letter-spacing:.5px;padding:5px 9px;border-bottom:1.5px solid var(--g200);font-family:var(--mono);}
td{padding:8px 9px;border-bottom:1px solid var(--g200);color:var(--g900);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr.tr-top td{font-weight:600;}
.rank-cell{font-family:var(--mono);font-size:12px;color:var(--g500);width:26px;}
.rank-1{color:var(--gold);font-weight:700;}
.few-badge{display:inline-block;font-size:9px;background:var(--g200);color:var(--g500);padding:1px 5px;border-radius:8px;margin-left:4px;font-family:var(--mono);vertical-align:middle;}

.winner-card{background:linear-gradient(135deg,var(--green-dark),var(--green));color:#fff;border-radius:var(--rl);padding:26px 22px;text-align:center;margin-bottom:14px;box-shadow:var(--shl);}
.w-trophy{font-size:34px;margin-bottom:6px;}
.w-lbl{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;opacity:.75;margin-bottom:6px;font-family:var(--mono);}
.w-name{font-size:28px;font-weight:700;letter-spacing:-.3px;margin-bottom:5px;}
.w-stats{font-size:13px;opacity:.85;font-family:var(--mono);}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:60px 14px 14px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.modal{background:#fff;border-radius:var(--rl);padding:22px;max-width:340px;width:100%;box-shadow:var(--shl);}
.modal h3{font-size:15px;font-weight:600;margin-bottom:11px;}
/* Modal add input also in a form */
.modal-form{margin-bottom:0;}
.modal-form input{width:100%;font-family:var(--font);font-size:16px;color:var(--g900);background:var(--g100);border:1.5px solid var(--g200);border-radius:var(--r);padding:10px 12px;outline:none;-webkit-appearance:none;margin-bottom:12px;}
.modal-form input:focus{border-color:var(--green);background:#fff;}
.modal-foot{display:flex;gap:7px;justify-content:flex-end;}
.modal select{width:100%;padding:12px 11px;border-radius:var(--r);border:1.5px solid var(--g200);font-family:var(--font);font-size:16px;background:var(--g100);outline:none;color:var(--g900);-webkit-appearance:none;appearance:none;margin-bottom:12px;}
.hidden{display:none!important;}
#view-play{display:none;}
#view-results{display:none;}

@media(max-width:480px){
  main{padding:14px 10px 40px;}
  .matchup{flex-direction:column;align-items:flex-start;}
  .team-r{justify-content:flex-start;}
  .w-name{font-size:22px;}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🏓</div>
    Pickleball RR
  </div>
  <div id="round-badge"></div>
</header>

<main>
  <div class="steps">
    <div class="step active" id="step1">1 · setup</div>
    <div class="step" id="step2">2 · play</div>
    <div class="step" id="step3">3 · results</div>
  </div>

  <!-- SETUP -->
  <div id="view-setup">
    <div class="card">
      <div class="card-title">🏟 Tournament setup</div>

      <span class="field-label">Number of courts</span>
      <div class="courts-row">
        <button type="button" class="ctr-btn" onclick="changeCourts(-1)">−</button>
        <div class="courts-val" id="courts-num">2</div>
        <button type="button" class="ctr-btn" onclick="changeCourts(1)">+</button>
        <span class="courts-hint" id="courts-hint">needs 4+ players per court</span>
      </div>

      <span class="field-label">Add players</span>
      <div class="add-form">
        <input
          type="text"
          id="player-input"
          placeholder="Name, or comma-separated…"
          autocorrect="off"
          autocomplete="off"
          autocapitalize="words"
          spellcheck="false"
        />
        <button type="button" id="add-btn">Add</button>
      </div>

      <div id="debug-log" style="font-size:12px;font-family:monospace;background:#fff3cd;border:1px solid #f9e79f;border-radius:8px;padding:8px;margin-bottom:8px;display:none;"></div>
      <div class="player-count" id="player-count">0 players added</div>
      <div class="chips" id="player-chips"></div>
      <div class="alert" id="setup-alert"></div>
      <div class="divider"></div>
      <button type="button" class="btn btn-primary" onclick="startTournament()">Start tournament →</button>
    </div>
  </div>

  <!-- PLAY -->
  <div id="view-play">
    <div class="card">
      <div class="play-header">
        <div class="card-title" style="margin-bottom:0" id="round-title">Round 1</div>
        <div class="btn-row">
          <button type="button" class="btn btn-success" onclick="openAddModal()">+ Late arrival</button>
          <button type="button" class="btn btn-danger" onclick="openRemoveModal()">− Drop out</button>
        </div>
      </div>
      <div class="sitout-bar" id="sitout-bar"></div>
      <div class="alert" id="play-alert"></div>
      <div id="courts-area"></div>
      <div class="divider"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
        <div class="btn-row">
          <button type="button" class="btn btn-primary" onclick="submitScores()">Submit scores &amp; next round →</button>
          <button type="button" class="standings-link" onclick="toggleStandings()">standings</button>
        </div>
        <button type="button" class="btn btn-danger" onclick="endTournament()">End tournament</button>
      </div>
      <div id="standings-panel">
        <div class="divider"></div>
        <div style="font-size:12px;font-weight:600;color:var(--g700);margin-bottom:8px;">Current standings</div>
        <table id="live-table"></table>
      </div>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="view-results">
    <div class="winner-card" id="winner-card"></div>
    <div class="card">
      <div class="card-title">Final standings</div>
      <table id="final-table"></table>
    </div>
    <button type="button" class="btn btn-primary" style="margin-top:4px" onclick="resetAll()">New tournament →</button>
  </div>
</main>

<!-- LATE ARRIVAL MODAL — also uses a form -->
<div class="overlay hidden" id="add-modal">
  <div class="modal">
    <h3>Late arrival</h3>
      <span class="field-label">Player name</span>
      <input
        type="text"
        id="add-input"
        placeholder="Name…"
        autocorrect="off"
        autocomplete="off"
        autocapitalize="words"
        spellcheck="false"
      />
      <div class="modal-foot">
        <button type="button" class="btn btn-secondary" onclick="closeModal('add-modal')">Cancel</button>
        <button type="button" class="btn btn-primary" id="modal-add-btn">Add to tournament</button>
      </div>
  </div>
</div>

<!-- DROP OUT MODAL -->
<div class="overlay hidden" id="remove-modal">
  <div class="modal">
    <h3>Player drop out</h3>
    <span class="field-label">Select player</span>
    <select id="remove-select"></select>
    <div class="modal-foot">
      <button type="button" class="btn btn-secondary" onclick="closeModal('remove-modal')">Cancel</button>
      <button type="button" class="btn btn-danger" onclick="confirmRemove()">Remove</button>
    </div>
  </div>
</div>

<script>
// All code runs after DOM is fully ready - prevents null element errors
document.addEventListener('DOMContentLoaded', function() {

var numCourts = 2;
var players = [];
var roundNum = 0;
var currentMatchups = [];
var currentSitouts = [];
var partnerHist = {};
var opponentHist = {};
var sitoutStreak = {};
var sitoutTotal = {};
var standingsOpen = false;

function gel(id){ return document.getElementById(id); }

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function showAlert(id, msg, type){
  var el=gel(id);
  el.className='alert alert-'+type;
  el.textContent=msg;
  el.style.display='block';
  clearTimeout(el._t);
  el._t=setTimeout(function(){ el.style.display='none'; },5000);
}

function setSteps(n){
  ['step1','step2','step3'].forEach(function(id,i){
    gel(id).className='step'+(i+1<n?' done':i+1===n?' active':'');
  });
}

// ── COURTS ──
function changeCourts(delta){
  numCourts=Math.max(1,Math.min(10,numCourts+delta));
  gel('courts-num').textContent=String(numCourts);
  gel('courts-hint').textContent='needs '+(numCourts*4)+'+ players per court';
}

// ── ADD PLAYERS — plain button click, no form, no submit, no iOS issues ──
gel('add-btn').addEventListener('click', handleAddSubmit);
gel('player-input').addEventListener('keydown', function(e){
  if(e.key === 'Enter'){ e.preventDefault(); handleAddSubmit(); }
});
gel('modal-add-btn').addEventListener('click', handleModalAddSubmit);
gel('add-input').addEventListener('keydown', function(e){
  if(e.key === 'Enter'){ e.preventDefault(); handleModalAddSubmit(); }
});

function dbg(msg){
  var d=gel('debug-log');
  d.style.display='block';
  d.innerHTML += msg + '<br>';
}

function handleAddSubmit(){
  dbg('ADD tapped');
  var inp = gel('player-input');
  dbg('input el: ' + (inp ? 'found' : 'NULL'));
  var raw = inp ? inp.value : '';
  dbg('raw value: [' + raw + ']');
  raw = raw.trim();
  if(!raw){ dbg('empty - returning'); return; }
  raw.split(',').map(function(n){ return n.trim(); }).filter(Boolean).forEach(function(name){
    if(!players.some(function(p){ return p.name.toLowerCase()===name.toLowerCase(); })){
      players.push({name:name,active:true,gamesPlayed:0,wins:0,pointsFor:0,pointsAgainst:0});
      dbg('added: ' + name);
    }
  });
  inp.value='';
  renderChips();
  gel('setup-alert').style.display='none';
  inp.focus();
}

function removeSetupPlayer(name){
  players=players.filter(function(p){ return p.name!==name; });
  renderChips();
}

function renderChips(){
  var c=gel('player-chips');
  c.innerHTML='';
  var active=players.filter(function(p){ return p.active; });
  active.forEach(function(p){
    var d=document.createElement('div');
    d.className='chip';
    var safe=p.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    d.innerHTML='<span>'+esc(p.name)+'</span><span class="chip-x" onclick="removeSetupPlayer(\''+safe+'\')">×</span>';
    c.appendChild(d);
  });
  gel('player-count').textContent=active.length+' player'+(active.length!==1?'s':'')+' added';
}

// ── START ──
function startTournament(){
  var active=players.filter(function(p){ return p.active; });
  if(active.length<4){ showAlert('setup-alert','Need at least 4 players to start.','amber'); return; }
  partnerHist={}; opponentHist={}; sitoutStreak={}; sitoutTotal={};
  players.forEach(function(p){
    partnerHist[p.name]={}; opponentHist[p.name]={};
    sitoutStreak[p.name]=0; sitoutTotal[p.name]=0;
  });
  roundNum=1;
  gel('view-setup').style.display='none';
  gel('view-play').style.display='block';
  setSteps(2);
  generateRound();
}

// ── ROUND LOGIC ──
function generateRound(){
  gel('round-title').textContent='Round '+roundNum;
  var rb=gel('round-badge');
  rb.textContent='Round '+roundNum;
  rb.style.display='inline-block';

  var active=players.filter(function(p){ return p.active; });
  var usable=Math.min(numCourts,Math.floor(active.length/4));

  if(usable===0){
    gel('courts-area').innerHTML='<div class="alert alert-amber" style="display:block;margin-bottom:0">Need at least 4 active players for a court.</div>';
    currentMatchups=[];
    currentSitouts=active.slice();
    updateSitoutBar();
    return;
  }

  var numSitout=active.length-usable*4;
  var sitouts=pickSitouts(active,numSitout);
  var playing=active.filter(function(p){ return sitouts.indexOf(p)===-1; });

  currentSitouts=sitouts;
  currentMatchups=bestMatchups(playing,usable);

  sitouts.forEach(function(p){
    sitoutStreak[p.name]=(sitoutStreak[p.name]||0)+1;
    sitoutTotal[p.name]=(sitoutTotal[p.name]||0)+1;
  });
  playing.forEach(function(p){ sitoutStreak[p.name]=0; });

  renderCourts();
  updateSitoutBar();
  gel('play-alert').style.display='none';
  standingsOpen=false;
  gel('standings-panel').style.display='none';
}

function pickSitouts(active,n){
  if(n<=0) return [];
  var pool=active.slice().sort(function(a,b){
    var sA=sitoutStreak[a.name]||0, sB=sitoutStreak[b.name]||0;
    var tA=sitoutTotal[a.name]||0,  tB=sitoutTotal[b.name]||0;
    if(sA>=1&&sB<1) return 1;
    if(sB>=1&&sA<1) return -1;
    if(tA!==tB) return tA-tB;
    return b.gamesPlayed-a.gamesPlayed;
  });
  return pool.slice(0,n);
}

function bestMatchups(playing,usable){
  var best=null,bs=-Infinity;
  var attempts=Math.min(50,playing.length*3);
  for(var t=0;t<attempts;t++){
    var arr=shuffle(playing.slice()),cs=[];
    for(var c=0;c<usable;c++) cs.push([arr[c*4],arr[c*4+1],arr[c*4+2],arr[c*4+3]]);
    var s=scoreMatchups(cs);
    if(s>bs){ bs=s; best=cs; }
  }
  return best||[];
}

function shuffle(arr){
  for(var i=arr.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1)),tmp=arr[i];arr[i]=arr[j];arr[j]=tmp;
  }
  return arr;
}

function scoreMatchups(cs){
  var score=0;
  cs.forEach(function(court){
    var a=court[0],b=court[1],c=court[2],d=court[3];
    score-=((partnerHist[a.name][b.name]||0)+(partnerHist[c.name][d.name]||0))*100;
    [[a,c],[a,d],[b,c],[b,d]].forEach(function(pr){
      score-=(opponentHist[pr[0].name][pr[1].name]||0)*5;
    });
  });
  return score;
}

function renderCourts(){
  var area=gel('courts-area');
  area.innerHTML='';
  currentMatchups.forEach(function(court,i){
    var a=court[0],b=court[1],c=court[2],d=court[3];
    var div=document.createElement('div');
    div.className='court-card';
    div.innerHTML=
      '<div class="court-lbl">Court '+(i+1)+'</div>'+
      '<div class="matchup">'+
        '<div class="team">'+
          '<span class="ptag tag-b">'+esc(a.name)+'</span>'+
          '<span style="font-size:11px;color:var(--g500)">&amp;</span>'+
          '<span class="ptag tag-b">'+esc(b.name)+'</span>'+
        '</div>'+
        '<div class="vs-badge">vs</div>'+
        '<div class="team team-r">'+
          '<span class="ptag tag-g">'+esc(c.name)+'</span>'+
          '<span style="font-size:11px;color:var(--g500)">&amp;</span>'+
          '<span class="ptag tag-g">'+esc(d.name)+'</span>'+
        '</div>'+
      '</div>'+
      '<div class="score-row">'+
        '<div class="score-col">'+
          '<input type="number" class="score-inp" id="sa'+i+'" min="0" max="99" inputmode="numeric" pattern="[0-9]*" placeholder="–" />'+
          '<div class="score-lbl">'+esc(a.name.split(' ')[0])+' / '+esc(b.name.split(' ')[0])+'</div>'+
        '</div>'+
        '<div class="score-dash">—</div>'+
        '<div class="score-col">'+
          '<input type="number" class="score-inp" id="sb'+i+'" min="0" max="99" inputmode="numeric" pattern="[0-9]*" placeholder="–" />'+
          '<div class="score-lbl">'+esc(c.name.split(' ')[0])+' / '+esc(d.name.split(' ')[0])+'</div>'+
        '</div>'+
      '</div>';
    area.appendChild(div);
  });
}

function updateSitoutBar(){
  var bar=gel('sitout-bar');
  if(currentSitouts.length>0){
    bar.style.display='block';
    bar.textContent='⏸ Sitting out: '+currentSitouts.map(function(p){ return p.name; }).join(', ');
  } else {
    bar.style.display='none';
  }
}

// ── SCORES ──
function submitScores(){
  if(currentMatchups.length===0){ showAlert('play-alert','No matchups to score.','amber'); return; }
  var results=[];
  for(var i=0;i<currentMatchups.length;i++){
    var ia=gel('sa'+i),ib=gel('sb'+i);
    if(!ia||!ib||ia.value===''||ib.value===''){
      showAlert('play-alert','Enter scores for all '+currentMatchups.length+' court'+(currentMatchups.length>1?'s':'')+'.','amber');
      return;
    }
    var t1=parseInt(ia.value,10),t2=parseInt(ib.value,10);
    if(isNaN(t1)||isNaN(t2)||t1<0||t2<0){ showAlert('play-alert','Scores must be positive numbers.','amber'); return; }
    if(t1===t2){ showAlert('play-alert','Court '+(i+1)+': scores cannot be tied.','amber'); return; }
    results.push({court:currentMatchups[i],t1:t1,t2:t2});
  }
  results.forEach(function(r){
    var a=r.court[0],b=r.court[1],c=r.court[2],d=r.court[3],w=r.t1>r.t2;
    [a,b].forEach(function(p){ p.gamesPlayed++; p.pointsFor+=r.t1; p.pointsAgainst+=r.t2; if(w) p.wins++; });
    [c,d].forEach(function(p){ p.gamesPlayed++; p.pointsFor+=r.t2; p.pointsAgainst+=r.t1; if(!w) p.wins++; });
    function addP(x,y){ partnerHist[x.name][y.name]=(partnerHist[x.name][y.name]||0)+1; partnerHist[y.name][x.name]=(partnerHist[y.name][x.name]||0)+1; }
    addP(a,b); addP(c,d);
    [[a,c],[a,d],[b,c],[b,d]].forEach(function(pr){
      opponentHist[pr[0].name][pr[1].name]=(opponentHist[pr[0].name][pr[1].name]||0)+1;
      opponentHist[pr[1].name][pr[0].name]=(opponentHist[pr[1].name][pr[0].name]||0)+1;
    });
  });
  roundNum++;
  generateRound();
}

// ── STANDINGS ──
function pScore(p){
  if(p.gamesPlayed===0) return -99999;
  return p.wins*10000+(p.wins/p.gamesPlayed)*1000+(p.pointsFor-p.pointsAgainst);
}
function getRanked(){
  return players.filter(function(p){ return p.gamesPlayed>0; })
    .slice().sort(function(a,b){ return pScore(b)-pScore(a); });
}
function renderTable(tid){
  var ranked=getRanked(),t=gel(tid);
  t.innerHTML='<tr><th>#</th><th>Player</th><th>W</th><th>GP</th><th>Win%</th><th>+/−</th></tr>';
  ranked.forEach(function(p,i){
    var wp=Math.round(p.wins/p.gamesPlayed*100),pd=p.pointsFor-p.pointsAgainst;
    var few=p.gamesPlayed<2?'<span class="few-badge">few games</span>':'';
    var tr=document.createElement('tr');
    if(i===0) tr.className='tr-top';
    tr.innerHTML='<td class="rank-cell '+(i===0?'rank-1':'')+'">'+(i===0?'🥇':i+1)+'</td>'+
      '<td>'+esc(p.name)+few+'</td><td>'+p.wins+'</td><td>'+p.gamesPlayed+'</td><td>'+wp+'%</td>'+
      '<td style="font-family:var(--mono);font-size:12px">'+(pd>=0?'+':'')+pd+'</td>';
    t.appendChild(tr);
  });
}
function toggleStandings(){
  standingsOpen=!standingsOpen;
  gel('standings-panel').style.display=standingsOpen?'block':'none';
  if(standingsOpen) renderTable('live-table');
}

// ── END ──
function endTournament(){
  if(!confirm('End the tournament and see final results?')) return;
  gel('view-play').style.display='none';
  gel('view-results').style.display='block';
  gel('round-badge').style.display='none';
  setSteps(3);
  var ranked=getRanked(),w=ranked[0],wc=gel('winner-card');
  if(w){
    var wp=Math.round(w.wins/w.gamesPlayed*100),pd=w.pointsFor-w.pointsAgainst;
    wc.innerHTML='<div class="w-trophy">🏆</div><div class="w-lbl">Tournament winner</div>'+
      '<div class="w-name">'+esc(w.name)+'</div>'+
      '<div class="w-stats">'+w.wins+' wins · '+wp+'% win rate · '+(pd>=0?'+':'')+pd+' pts</div>';
  } else {
    wc.innerHTML='<div class="w-lbl">No games completed yet.</div>';
  }
  renderTable('final-table');
}

// ── MODALS ──
function openAddModal(){
  gel('add-input').value='';
  gel('add-modal').classList.remove('hidden');
  setTimeout(function(){ gel('add-input').focus(); },60);
}

function handleModalAddSubmit(){
  var name=gel('add-input').value.trim();
  if(!name) return;
  closeModal('add-modal');
  if(!partnerHist[name]){ partnerHist[name]={}; opponentHist[name]={}; sitoutStreak[name]=0; sitoutTotal[name]=0; }
  var ex=players.filter(function(p){ return p.name.toLowerCase()===name.toLowerCase(); })[0];
  if(ex){ ex.active=true; showAlert('play-alert',ex.name+' re-activated.','green'); }
  else { players.push({name:name,active:true,gamesPlayed:0,wins:0,pointsFor:0,pointsAgainst:0}); showAlert('play-alert',name+' added!','green'); }
  generateRound();
}

function openRemoveModal(){
  var sel=gel('remove-select');
  sel.innerHTML='';
  players.filter(function(p){ return p.active; }).forEach(function(p){
    var o=document.createElement('option'); o.value=p.name; o.textContent=p.name; sel.appendChild(o);
  });
  if(!sel.options.length){ showAlert('play-alert','No active players to remove.','amber'); return; }
  gel('remove-modal').classList.remove('hidden');
}

function confirmRemove(){
  var name=gel('remove-select').value;
  closeModal('remove-modal');
  var p=players.filter(function(x){ return x.name===name; })[0];
  if(p){ p.active=false; showAlert('play-alert',p.name+' removed.','amber'); generateRound(); }
}

function closeModal(id){ gel(id).classList.add('hidden'); }
gel('add-modal').addEventListener('click', function(e){ if(e.target===gel('add-modal')) closeModal('add-modal'); });
gel('remove-modal').addEventListener('click', function(e){ if(e.target===gel('remove-modal')) closeModal('remove-modal'); });

// ── RESET ──
function resetAll(){
  players=[]; roundNum=0; currentMatchups=[]; currentSitouts=[];
  partnerHist={}; opponentHist={}; sitoutStreak={}; sitoutTotal={}; standingsOpen=false; numCourts=2;
  gel('courts-num').textContent='2';
  gel('courts-hint').textContent='needs 4+ players per court';
  gel('player-chips').innerHTML='';
  gel('player-count').textContent='0 players added';
  gel('player-input').value='';
  gel('setup-alert').style.display='none';
  gel('view-results').style.display='none';
  gel('view-play').style.display='none';
  gel('view-setup').style.display='block';
  gel('round-badge').style.display='none';
  setSteps(1);
}

}); // end DOMContentLoaded
</script>
